<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DSE History 歷史科模擬答題系統</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <style>
      body { background-color: #f3f4f6; margin: 0; }
      #root { min-height: 100vh; }
    </style>
  </head>
  <body>
    <div id="root">
      <div style="display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; color: #666;">
        系統載入中，請稍候...
      </div>
    </div>
    
    <script type="text/babel">
      // 從全域物件提取 React Hook
      const { useState, useEffect, useRef, useCallback } = React;

      // 預定義圖標組件，防止 App.js 因找不到組件而崩潰
      const iconStyle = { marginRight: '4px' };
      window.FileText = () => <span style={iconStyle}>📝</span>;
      window.Clock = () => <span style={iconStyle}>⏱️</span>;
      window.Target = () => <span style={iconStyle}>🎯</span>;
      window.CheckCircle = () => <span style={iconStyle}>✅</span>;
      window.AlertTriangle = () => <span style={iconStyle}>⚠️</span>;
      window.Copy = () => <span style={iconStyle}>📋</span>;
      window.ChevronDown = () => <span style={iconStyle}>▼</span>;

      async function bootApp() {
        try {
          // A. 抓取你的 App.js
          const response = await fetch('/src/App.js');
          if (!response.ok) throw new Error('無法讀取 /src/App.js，請檢查檔案路徑');
          
          let scriptText = await response.text();
          
          // B. 清理代碼：移除所有 import 和 export 關鍵字
          const cleanCode = scriptText
            .replace(/import\s+.*?\s+from\s+['"].*?['"];?/g, '')
            .replace(/export\s+default\s+App;?/g, '')
            .replace(/export\s+default\s+/g, '');

          // C. 使用 Babel 轉換 JSX
          const transformed = Babel.transform(cleanCode, { 
            presets: ['react'] 
          }).code;

          // D. 關鍵：執行代碼並將 App 函數強制暴露到全域 window
          const finalCode = transformed + "\nwindow.App = App;";
          eval(finalCode); 

          // E. 渲染 App
          if (typeof window.App !== 'undefined') {
            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<window.App />);
          } else {
            throw new Error('代碼已執行但找不到 App 函數');
          }
          
        } catch (err) {
          console.error("啟動失敗:", err);
          document.getElementById('root').innerHTML = `
            <div style="padding: 40px; font-family: sans-serif; color: #e11d48; text-align: center;">
              <h1 style="font-size: 24px;">⚠️ 網頁啟動失敗</h1>
              <p style="margin-top: 10px;">錯誤訊息：${err.message}</p>
              <p style="font-size: 14px; color: #666;">提示：請按 F12 打開 Console 查看詳細日誌</p>
            </div>
          `;
        }
      }

      // 開始
